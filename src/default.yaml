          { oid: 7904830550, boardId: 5761849768, colId: "text8__1", type: "text", disp: "Have a clear statement on the requisition form regarding disposal of samples. Have a statement in QA Manual too.", color: "", idx: -1, t1: "", t2: "" },
          { oid: 7904830550, boardId: 5761849768, colId: "text__1", type: "text", disp: "A new fridge was purchased to have more space for keeping client samples. A statement was added to the QA Manual. The requisition form was also updated", color: "", idx: -1, t1: "", t2: "" },
