          { oid: 7904830550, boardId: 5761849768, colId: "text", type: "text", disp: "Some client samples are being stored for a long time which pressure the lab space and some clients samples get discarded earlier because of lack of fridge space", color: "", idx: -1, t1: "", t2: "" },
          { oid: 7904830550, boardId: 5761849768, colId: "text5", type: "text", disp: "Occupying lab space affect the lab operations. Not having a clear protocol for discarding client samples might get the lab in trouble if a sample gets disposed of and the client asks for it", color: "", idx: -1, t1: "", t2: "" },
          { oid: 7904830550, boardId: 5761849768, colId: "person", type: "person", disp: "Dorna Sobhani", color: "", idx: -1, t1: "", t2: "" },
