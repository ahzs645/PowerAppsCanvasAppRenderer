Screens:
  Screen1:
    Properties:
      Fill: =RGBA(246, 247, 251, 1)
      OnVisible: =Select(btnRebuild)
    Children:
      - RootSplit:
          Control: GroupContainer
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(246, 247, 251, 1)
            X: =0
            Y: =0
            Height: =Parent.Height
            Width: =Parent.Width
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutGap: =0
          Children:
            - LeftSidebar:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Width: =260
                  FillPortions: =0
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  PaddingTop: =12
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  LayoutGap: =2
                  BorderThickness: =1
                  BorderColor: =RGBA(0, 0, 0, 0.06)
                Children:
                  - txtBoardsHdr:
                      Control: ModernText
                      Properties:
                        PaddingTop: =0
                        PaddingBottom: =0
                        Text: ="BOARDS"
                        X: =8
                        Width: =240
                        Height: =28
                        Size: =12
                        FontWeight: =FontWeight.Bold
                        Color: =RGBA(108, 110, 118, 1)
                        FillPortions: =0
                        VerticalAlign: =VerticalAlign.Middle
                        AutoHeight: =false
                  - galBoards:
                      Control: Gallery
                      Variant: Vertical
                      Properties:
                        Items: =Sort(colBoards, order)
                        TemplateSize: =44
                        Width: =244
                        FillPortions: =1
                        ShowScrollbar: =false
                        Fill: =RGBA(255, 255, 255, 1)
                      Children:
                        - rectSelBg:
                            Control: GroupContainer
                            Variant: ManualLayout
                            Properties:
                              X: =4
                              Y: =2
                              Width: =236
                              Height: =40
                              Fill: =If(ThisItem.id = selBoardId, RGBA(0, 115, 234, 0.10), RGBA(0, 0, 0, 0))
                              RadiusTopLeft: =6
                              RadiusTopRight: =6
                              RadiusBottomLeft: =6
                              RadiusBottomRight: =6
                        - txtBoardName:
                            Control: ModernText
                            Properties:
                              PaddingTop: =0
                              PaddingBottom: =0
                              Text: =ThisItem.name
                              X: =16
                              Y: =0
                              Width: =212
                              Height: =44
                              Color: =If(ThisItem.id = selBoardId, RGBA(0, 115, 234, 1), RGBA(50, 51, 56, 1))
                              FontWeight: =If(ThisItem.id = selBoardId, FontWeight.Semibold, FontWeight.Normal)
                              Size: =14
                              VerticalAlign: =VerticalAlign.Middle
                              AutoHeight: =false
                        - btnBoard:
                            Control: Button
                            Properties:
                              Text: =""
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              X: =0
                              Y: =0
                              Width: =244
                              Height: =44
                              OnSelect: =Set(selBoardId, ThisItem.id); Set(gblSearch, ""); Set(panelOpen, false); Select(btnRebuild)
            - MainArea:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  FillPortions: =1
                  Fill: =RGBA(246, 247, 251, 1)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutGap: =0
                Children:
                  - Toolbar:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =0
                        Height: =64
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutGap: =12
                        PaddingLeft: =20
                        PaddingRight: =20
                        BorderThickness: =1
                        BorderColor: =RGBA(0, 0, 0, 0.06)
                      Children:
                        - txtTitle:
                            Control: ModernText
                            Properties:
                              PaddingTop: =0
                              PaddingBottom: =0
                              Text: =LookUp(colBoards, id = selBoardId).name
                              Size: =22
                              FontWeight: =FontWeight.Bold
                              Color: =RGBA(50, 51, 56, 1)
                              Width: =320
                              Height: =40
                              FillPortions: =0
                              VerticalAlign: =VerticalAlign.Middle
                              AutoHeight: =false
                        - txtCount:
                            Control: ModernText
                            Properties:
                              PaddingTop: =0
                              PaddingBottom: =0
                              Text: =CountRows(Filter(colItems, boardId = selBoardId)) & " items"
                              Size: =13
                              Color: =RGBA(108, 110, 118, 1)
                              Width: =80
                              Height: =40
                              FillPortions: =0
                              VerticalAlign: =VerticalAlign.Middle
                              AutoHeight: =false
                        - spacerTb:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              Fill: =RGBA(0, 0, 0, 0)
                              FillPortions: =1
                              Height: =40
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutMinWidth: =16
                        - inpSearch:
                            Control: ModernTextInput
                            Properties:
                              Default: =gblSearch
                              Placeholder: ="Search items"
                              OnChange: =Set(gblSearch, Self.Text); Select(btnRebuild)
                              Type: =TextInputType.Search
                              Appearance: =Appearance.Outline
                              Size: =14
                              Width: =260
                              Height: =36
                              FillPortions: =0
                        - btnAddItem:
                            Control: Button
                            Properties:
                              Text: ="+ Item"
                              Appearance: ='ButtonCanvas.Appearance'.Secondary
                              Width: =84
                              Height: =36
                              FillPortions: =0
                              OnSelect: |-
                                =Set(gAddGid, First(Sort(Filter(colGroups, boardId = selBoardId), order)).gid);
                                Collect(colItems, {boardId: selBoardId, id: nextId, gid: gAddGid, sort: CountRows(Filter(colItems, boardId = selBoardId && gid = gAddGid)) + 1, name: "New item", hasSubs: false, expanded: false});
                                Collect(colCells, ForAll(Filter(colColumns, boardId = selBoardId && isSub = false) As C, {oid: nextId, boardId: selBoardId, colId: C.colId, type: C.kind, disp: "", color: "", idx: -1, t1: "", t2: ""}));
                                Set(nextId, nextId + 1);
                                Select(btnRebuild)
                        - btnAddGroup:
                            Control: Button
                            Properties:
                              Text: ="+ Group"
                              Appearance: ='ButtonCanvas.Appearance'.Secondary
                              Width: =96
                              Height: =36
                              FillPortions: =0
                              OnSelect: |-
                                =Collect(colGroups, {boardId: selBoardId, gid: "g" & Text(nextId), title: "New group", color: "#579bfc", order: CountRows(Filter(colGroups, boardId = selBoardId)) + 1, collapsed: false});
                                Set(nextId, nextId + 1);
                                Select(btnRebuild)
                        - btnRebuild:
                            Control: Button
                            Properties:
                              Text: =""
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              Width: =1
                              Height: =1
                              FillPortions: =0
                              OnSelect: |-
                                =Set(gblColCount, CountRows(Filter(colColumns, boardId = selBoardId && isSub = false)));
                                Set(gblBoardW, 240 + 160 * gblColCount);
                                Clear(colRows);
                                Collect(colRows, ForAll(
                                  Sort(Filter(colGroups, boardId = selBoardId), order) As G,
                                  { kind: "group", sortKey: G.order * 1000000, gid: G.gid, title: G.title, color: G.color, collapsed: G.collapsed, oid: -1, name: "", hasSubs: false, expanded: false, cnt: CountRows(Filter(colItems, boardId = selBoardId && gid = G.gid)) }
                                ));
                                Collect(colRows, ForAll(
                                  Sort(Filter(colItems As IT, IT.boardId = selBoardId && (gblSearch = "" || gblSearch in IT.name) && Not(LookUp(colGroups, boardId = selBoardId && gid = IT.gid).collapsed)), sort) As I,
                                  { kind: "item", sortKey: LookUp(colGroups, boardId = selBoardId && gid = I.gid).order * 1000000 + I.sort * 100, gid: I.gid, title: "", color: "", collapsed: false, oid: I.id, name: I.name, hasSubs: I.hasSubs, expanded: I.expanded, cnt: 0 }
                                ));
                                Collect(colRows, ForAll(
                                  Sort(Filter(colSubitems As S, S.boardId = selBoardId && LookUp(colItems, id = S.parentId).expanded), sort) As SB,
                                  { kind: "sub", sortKey: LookUp(colGroups, boardId = selBoardId && gid = LookUp(colItems, id = SB.parentId).gid).order * 1000000 + LookUp(colItems, id = SB.parentId).sort * 100 + SB.sort, gid: "", title: "", color: "", collapsed: false, oid: SB.id, name: SB.name, hasSubs: false, expanded: false, cnt: 0 }
                                ))
