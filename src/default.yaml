                    =Collect(colStatusLabels, {boardId: selBoardId, colId: lblColId, idx: If(CountRows(Filter(colStatusLabels, boardId = selBoardId && colId = lblColId)) = 0, 0, Max(Filter(colStatusLabels, boardId = selBoardId && colId = lblColId), idx) + 1), label: "New label", color: "#579bfc"}); Select(btnRebuild)
            - btnLblDone:
                Control: Button
                Properties:
                  Text: ="Done"
